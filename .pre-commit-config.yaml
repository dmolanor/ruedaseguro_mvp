# pre-commit configuration for RuedaSeguro
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types_or: [markdown, json, yaml]
        exclude: ^(mobile/|admin-portal/)

  # Flutter-specific (requires local flutter installation)
  - repo: local
    hooks:
      - id: flutter-format
        name: Flutter Format
        # Flutter 3.x removed `flutter format`; use `dart format` instead.
        entry: dart format
        language: system
        files: \.dart$
        pass_filenames: true
      - id: flutter-analyze
        name: Flutter Analyze
        # --fatal-infos and --fatal-warnings omitted: only errors block commit.
        entry: bash -c "cd mobile && flutter analyze --no-fatal-infos --no-fatal-warnings"
        language: system
        files: \.dart$
        pass_filenames: false
