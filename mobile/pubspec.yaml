name: ruedaseguro
description: "RuedaSeguro — B2B2C motorcycle insurance for Venezuelan riders."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Core
  flutter_riverpod: ^3.3.1
  go_router: ^17.1.0
  supabase_flutter: ^2.9.0

  # OCR & Camera
  google_mlkit_text_recognition: ^0.15.1
  camera: ^0.12.0+1
  image_picker: ^1.1.2

  # Local Storage
  sqflite: ^2.4.2
  shared_preferences: ^2.3.5
  hive: ^2.2.3

  # Security
  local_auth: ^3.0.1
  flutter_secure_storage: ^10.0.0
  crypto: ^3.0.6

  # Connectivity & Network
  connectivity_plus: ^7.0.0
  dio: ^5.7.0
  path: ^1.9.1

  # PDF & Documents
  pdf: ^3.11.3
  printing: ^5.14.2
  share_plus: ^12.0.1

  # UI
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  fl_chart: ^1.2.0
  google_fonts: ^8.0.2

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  permission_handler: ^12.0.1

  # Phase 1.5 (prepared but not activated)
  # sensors_plus: ^4.0.2
  # background_fetch: ^1.3.7
  # geolocator: ^11.1.0
  # flutter_background_service: ^5.0.12

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/
